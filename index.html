var filtered = rows.slice();

function badgeClass(k){
  if(k==='ΑΠΟΘΗΚΕΥΣΗ') return 'b-apoth';
  if(k==='ΑΜΕΣΗ') return 'b-amesi';
  if(k==='ΠΑΡΑΔΟΘΗΚΕ') return 'b-deliv';
  if(k==='ΣΕ ΜΕΤΑΦΟΡΑ') return 'b-transit';
  return 'b-wait';
}

var officeFields=['id','xora','a','pAfx','pPar','kola','sysk','kila','pelatis','paratir'];
var warehouseFields=['afx','par','katast','thesi','paratir'];

function canEdit(f){
  if(role==='admin') return true;
  if(role==='office') return officeFields.indexOf(f)>=0;
  if(role==='warehouse') return warehouseFields.indexOf(f)>=0;
  return false;
}

function esc(v){return (v||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function cellInput(rowIdx, f, val){
  var ed = canEdit(f);
  var cls = ed ? 'ec' : 'rc';
  if(f==='katast'){
    var opts=['ΑΠΟΘΗΚΕΥΣΗ','ΑΜΕΣΗ','ΑΝΑΜΟΝΗ','ΣΕ ΜΕΤΑΦΟΡΑ','ΠΑΡΑΔΟΘΗΚΕ'];
    var s='<select '+(ed?'':'disabled')+' onchange="updateField('+rowIdx+',\'katast\',this.value)" style="width:100%;font-size:11px">';
    opts.forEach(function(o){s+='<option'+(val===o?' selected':'')+'>'+o+'</option>';});
    return '<td class="'+cls+'">'+s+'</select></td>';
  }
  return '<td class="'+cls+'"><input type="text" '+(ed?'':'disabled')+' value="'+esc(val)+'" onchange="updateField('+rowIdx+',\''+f+'\',this.value)"></td>';
}

function updateField(idx, field, val){
  var old = rows[idx][field];
  rows[idx][field] = val;
  if(old !== val) showNotif(rows[idx].pelatis || rows[idx].id, field, val);
}

function showNotif(pelatis, field, val){
  var labels={katast:'Κατάσταση',afx:'Άφιξη',par:'Παράδοση',thesi:'Θέση αποθ.',paratir:'Παρατηρήσεις'};
  var lbl = labels[field] || field;
  var roleLabel = role==='office'?'Γραφείο':role==='warehouse'?'Αποθήκη':'Admin';
  var n = document.getElementById('notif');
  document.getElementById('notif-text').textContent = roleLabel+' → '+pelatis+': '+lbl+' "'+val+'"';
  n.style.display='flex';
  n.style.alignItems='center';
  n.style.gap='8px';
  clearTimeout(window._nt);
  window._nt = setTimeout(function(){n.style.display='none';},4000);
}

function render(){
  var tb = document.getElementById('tbody');
  var html = '';
  filtered.forEach(function(row){
    var ri = rows.indexOf(row);
    html += '<tr>';
    html += cellInput(ri,'id',row.id);
    html += cellInput(ri,'xora',row.xora);
    html += cellInput(ri,'a',row.a);
    html += cellInput(ri,'pAfx',row.pAfx);
    html += cellInput(ri,'afx',row.afx);
    html += cellInput(ri,'pPar',row.pPar);
    html += cellInput(ri,'par',row.par);
    html += cellInput(ri,'kola',row.kola);
    html += cellInput(ri,'sysk',row.sysk);
    html += cellInput(ri,'kila',row.kila);
    html += cellInput(ri,'pelatis',row.pelatis);
    html += cellInput(ri,'katast',row.katast);
    html += cellInput(ri,'paratir',row.paratir);
    html += cellInput(ri,'thesi',row.thesi);
    html += '</tr>';
  });
  tb.innerHTML = html;
}

function setRole(r, btn){
  role = r;
  document.querySelectorAll('.role-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  render();
}

function filterRows(q){
  searchQ = q.toLowerCase();
  applyFilters();
}

function filterStatus(s){
  statusF = s;
  applyFilters();
}

function applyFilters(){
  filtered = rows.filter(function(r){
    var matchQ = !searchQ || (r.id+r.pelatis+r.paratir+r.xora).toLowerCase().indexOf(searchQ)>=0;
    var matchS = !statusF || r.katast===statusF;
    return matchQ && matchS;
  });
  render();
}

function saveAll(){
  var t = document.getElementById('toast');
  t.style.display='inline-block';
  setTimeout(function(){t.style.display='none';},2500);
}

render();
</script>
