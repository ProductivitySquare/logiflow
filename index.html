  {id:'26.01.400',xora:'Ιταλία',a:'',pAfx:'2026-04-01',afx:'',pPar:'',par:'',kola:'66',sysk:'ΠΑΛ',kila:'2656',pelatis:'PROMENS / ΦΑΜΑΡ ΑΥΛΩΝΑ',katast:'ΑΜΕΣΗ',paratir:'ΑΜΕΣΗ ΑΥΛΩΝΑ',thesi:''},
  {id:'26.01.431',xora:'Πολωνία',a:'',pAfx:'',afx:'',pPar:'',par:'',kola:'1',sysk:'ΠΑΛ',kila:'385',pelatis:'ΓΕΓΟΣ / STOKSON',katast:'ΑΜΕΣΗ',paratir:'ΑΜΕΣΗ SARMED ΑΣΠΡΟΠΥΡΓΟΣ',thesi:''}
];

var filtered = rows.slice();

var officeFields=['id','xora','a','pAfx','pPar','kola','sysk','kila','pelatis','paratir'];
var warehouseFields=['afx','par','katast','thesi','paratir'];

function canEdit(f){
  if(role==='admin') return true;
  if(role==='office') return officeFields.indexOf(f)>=0;
  if(role==='warehouse') return warehouseFields.indexOf(f)>=0;
  return false;
}

function formatDateDisplay(val){
  if(!val) return '';
  if(val.indexOf('-')>-1){
    var p=val.split('-');
    if(p.length===3) return p[2]+'/'+p[1];
  }
  return val;
}

function updateField(idx, field, val){
  var old = rows[idx][field];
  rows[idx][field] = val;
  if(old !== val) showNotif(rows[idx].pelatis || rows[idx].id, field, val);
}

function showNotif(pelatis, field, val){
  var labels={katast:'Κατάσταση',afx:'Άφιξη',par:'Παράδοση',thesi:'Θέση αποθ.',paratir:'Παρατηρήσεις',pAfx:'Πρβλ. Άφιξη',xora:'Χώρα',a:'Χρήστης'};
  var lbl = labels[field] || field;
  var roleLabel = role==='office'?'Γραφείο':role==='warehouse'?'Αποθήκη':'Admin';
  var dispVal = (field==='pAfx'||field==='pPar') ? formatDateDisplay(val) : val;
  var n = document.getElementById('notif');
  document.getElementById('notif-text').textContent = roleLabel+' → '+pelatis+': '+lbl+' "'+dispVal+'"';
  n.style.display='flex';
  clearTimeout(window._nt);
  window._nt = setTimeout(function(){n.style.display='none';},4000);
}

/* ---- MERIDA masked input ---- */
function makeMeridaCell(rowIdx, val, editable){
  var cls = editable ? 'ec' : 'rc';
  if(!editable){
    return '<td class="'+cls+'"><input type="text" disabled value="'+esc(val)+'"></td>';
  }
  return '<td class="'+cls+'"><input class="merida-input" type="text" placeholder="00.00.000" maxlength="10" value="'+esc(val)+'" oninput="onMeridaInput(this,'+rowIdx+')" onchange="updateField('+rowIdx+',\'id\',this.value)"></td>';
}

function onMeridaInput(el, rowIdx){
  var raw = el.value.replace(/[^0-9]/g,'');
  var out = '';
  for(var i=0;i<raw.length && i<7;i++){
    if(i===2||i===4) out+='.';
    out+=raw[i];
  }
  el.value = out;
  rows[rowIdx].id = out;
}

/* ---- COUNTRY autocomplete ---- */
function makeCountryCell(rowIdx, val, editable){
  var cls = editable ? 'ec' : 'rc';
  if(!editable){
    return '<td class="'+cls+'"><input type="text" disabled value="'+esc(val)+'"></td>';
  }
  var uid = 'ac_'+rowIdx;
  return '<td class="'+cls+'" style="position:relative"><div class="ac-wrap">'+
    '<input type="text" id="'+uid+'" value="'+esc(val)+'" autocomplete="off" '+
    'oninput="showAC(this,'+rowIdx+')" onblur="hideAC(\''+uid+'\')" '+
    'onchange="updateField('+rowIdx+',\'xora\',this.value)" placeholder="Χώρα...">'+
    '<div class="ac-list" id="list_'+uid+'" style="display:none"></div>'+
    '</div></td>';
}

function showAC(inp, rowIdx){
  var uid = inp.id;
  var q = inp.value.toLowerCase();
  var list = document.getElementById('list_'+uid);
  if(!q){list.style.display='none';return;}
  var matches = COUNTRIES.filter(function(c){return c.toLowerCase().indexOf(q)===0;});
  if(!matches.length){list.style.display='none';return;}
  list.innerHTML = matches.map(function(c,i){
    return '<div class="ac-item" onmousedown="pickCountry(\''+uid+'\',\''+c+'\','+rowIdx+')">'+c+'</div>';
  }).join('');
  list.style.display='block';
}

function pickCountry(uid, val, rowIdx){
  document.getElementById(uid).value = val;
  document.getElementById('list_'+uid).style.display='none';
  rows[rowIdx].xora = val;
  showNotif(rows[rowIdx].pelatis||rows[rowIdx].id,'xora',val);
}

function hideAC(uid){
  setTimeout(function(){
    var l=document.getElementById('list_'+uid);
    if(l) l.style.display='none';
  },200);
}

/* ---- USER select ---- */
function makeUserCell(rowIdx, val, editable){
  var cls = editable ? 'ec' : 'rc';
  if(!editable){
    return '<td class="'+cls+'"><input type="text" disabled value="'+esc(val)+'"></td>';
  }
  var opts = USERS.map(function(u){
    return '<option'+(val===u?' selected':'')+'>'+u+'</option>';
  }).join('');
  return '<td class="'+cls+'"><select onchange="updateField('+rowIdx+',\'a\',this.value)">'+
    '<option value=""></option>'+opts+'</select></td>';
}

/* ---- DATE picker ---- */
function makeDateCell(rowIdx, field, val, editable){
  var cls = editable ? 'ec' : 'rc';
  var display = formatDateDisplay(val);
  if(!editable){
    return '<td class="'+cls+'"><input type="text" disabled value="'+esc(display)+'"></td>';
  }
  var isoVal = (val && val.indexOf('-')>-1) ? val : '';
  return '<td class="'+cls+'"><input type="date" value="'+esc(isoVal)+'" '+
    'onchange="updateField('+rowIdx+',\''+field+'\',this.value)"></td>';
}

/* ---- generic text cell ---- */
function makeTextCell(rowIdx, field, val, editable){
  var cls = editable ? 'ec' : 'rc';
  return '<td class="'+cls+'"><input type="text" '+(editable?'':'disabled')+' value="'+esc(val)+'" '+
    'onchange="updateField('+rowIdx+',\''+field+'\',this.value)"></td>';
}

/* ---- katast select ---- */
function makeKatastCell(rowIdx, val, editable){
  var cls = editable ? 'ec' : 'rc';
  var opts=['ΑΠΟΘΗΚΕΥΣΗ','ΑΜΕΣΗ','ΑΝΑΜΟΝΗ','ΣΕ ΜΕΤΑΦΟΡΑ','ΠΑΡΑΔΟΘΗΚΕ'];
  var s='<select '+(editable?'':'disabled')+' onchange="updateField('+rowIdx+',\'katast\',this.value)" style="font-size:11px">';
  opts.forEach(function(o){s+='<option'+(val===o?' selected':'')+'>'+o+'</option>';});
  return '<td class="'+cls+'">'+s+'</select></td>';
}

function esc(v){return (v||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function render(){
  var tb = document.getElementById('tbody');
  var html = '';
  filtered.forEach(function(row){
    var ri = rows.indexOf(row);
    html += '<tr>';
    html += makeMeridaCell(ri, row.id, canEdit('id'));
    html += makeCountryCell(ri, row.xora, canEdit('xora'));
    html += makeUserCell(ri, row.a, canEdit('a'));
    html += makeDateCell(ri, 'pAfx', row.pAfx, canEdit('pAfx'));
    html += makeTextCell(ri, 'afx', row.afx, canEdit('afx'));
    html += makeDateCell(ri, 'pPar', row.pPar, canEdit('pPar'));
    html += makeTextCell(ri, 'par', row.par, canEdit('par'));
    html += makeTextCell(ri, 'kola', row.kola, canEdit('kola'));
    html += makeTextCell(ri, 'sysk', row.sysk, canEdit('sysk'));
    html += makeTextCell(ri, 'kila', row.kila, canEdit('kila'));
    html += makeTextCell(ri, 'pelatis', row.pelatis, canEdit('pelatis'));
    html += makeKatastCell(ri, row.katast, canEdit('katast'));
    html += makeTextCell(ri, 'paratir', row.paratir, canEdit('paratir'));
    html += makeTextCell(ri, 'thesi', row.thesi, canEdit('thesi'));
    html += '</tr>';
  });
  tb.innerHTML = html;
}

function setRole(r, btn){
  role = r;
  document.querySelectorAll('.role-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  render();
}

function filterRows(q){
  searchQ = q.toLowerCase();
  applyFilters();
}

function filterStatus(s){
  statusF = s;
  applyFilters();
}

function applyFilters(){
  filtered = rows.filter(function(r){
    var matchQ = !searchQ || (r.id+r.pelatis+r.paratir+r.xora).toLowerCase().indexOf(searchQ)>=0;
    var matchS = !statusF || r.katast===statusF;
    return matchQ && matchS;
  });
  render();
}

function saveAll(){
  var t = document.getElementById('toast');
  t.style.display='inline-block';
  setTimeout(function(){t.style.display='none';},2500);
}

render();
</script>
